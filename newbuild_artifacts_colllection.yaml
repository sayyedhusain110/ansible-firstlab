---
- name: New Build Artifact collection
  hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Service status check
      command: systemctl is-active {{ item }}
      loop:
        - rsyslog
        - sshd
        - firewalld
      register: service_status

    - name: Command output for service status check
      shell: "{{ item }}"
      loop:
        - uname -n ; date
        #- date
        - cat /etc/redhat-release
        - df -h 
        - lsblk 
        - lscpu | awk '/^CPU\(s\):/ {print "CPU:", $2}'
        - free -h | awk '/^Mem:/ {print "total mem:",$2} /^Swap:/ {print "swap:" $2}'        
        - ifconfig | awk '/^[a-z]/ {iface=$1} /inet / {print iface, $2}'
        - iptables -L
       #- top -b -n 1 | head -n 20
      register: command_output  

    - name: Create artifact report file
      copy:
        content: |
          =========================================
          BUILD ARTIFACT REPORT - {{ inventory_hostname }}
          =========================================

          ******** SERVICE STATUS ********
          {% for item in service_status.results %}

          ---------------------------------
          Service: {{ item.item }}
          {{ item.stdout }}


          {% endfor %}

          ******** SYSTEM / DISK / MEMORY ********


          {% for item in command_output.results %}

          Command: {{ item.item }}
          {{ item.stdout }}     

        
          {% endfor %}

          =========================================


        dest: "./artifact_{{ inventory_hostname }}.txt"
      delegate_to: localhost
