- name: Apply all security and bugfix updates
  yum:
    name: '*'
    state: latest
  register: patching_result
  notify: Reboot system if required
  
- name: Show patching result
  debug:
    var: patching_result
      
- name: Wait for system to come back
  wait_for_connection:
    timeout: 300

- name: Check uptime after patching
  shell: uptime
  register: uptime_after

- name: Show uptime after patching
  debug:
    var: uptime_after.stdout

- name: Verify no pending updates
  yum:
    list: updates
  register: post_updates

- name: Show remaining updates
  debug:
    msg: "Remaining updates: {{ post_updates.results | length }}"