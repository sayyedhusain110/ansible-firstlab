---
# PATCHING
- name: Apply all updates
  yum:
    name: '*'
    state: latest
  register: patching_result
  ignore_errors: true

- name: Set patch status
  set_fact:
    patch_status: "{{ 'SUCCESS' if patching_result is not failed else 'FAILED' }}"

- name: Debug patch result
  debug:
    msg: "Host {{ inventory_hostname }} patch status: {{ patch_status }}"

# REBOOT
- name: Check if reboot required
  command: needs-restarting -r
  register: reboot_required
  ignore_errors: true
  changed_when: false

- name: Reboot system if required
  reboot:
    msg: "Reboot initiated by Ansible"
    reboot_timeout: 300
  when: reboot_required.rc == 1

- name: Wait for connection
  wait_for_connection:
    timeout: 300

- name: Get uptime
  shell: uptime
  register: uptime_after

# VERIFY
- name: Check remaining updates
  yum:
    list: updates
  register: post_updates

- name: Set remaining updates
  set_fact:
    remaining_updates: "{{ post_updates.results | length }}"

# REPORT DATA
- name: Store host report
  set_fact:
    host_report:
      hostname: "{{ inventory_hostname }}"
      status: "{{ patch_status }}"
      updates_remaining: "{{ remaining_updates }}"
      uptime: "{{ uptime_after.stdout }}"